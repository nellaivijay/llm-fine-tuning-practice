name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8
        pip install -r requirements.txt
    
    - name: Lint with flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11']
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
        pip install -r requirements.txt
    
    - name: Test imports
      run: |
        python -c "import torch"
        python -c "import transformers"
        python -c "import peft"
        python -c "import datasets"
        python -c "import accelerate"
    
    - name: Test notebooks
      run: |
        pip install nbconvert jupyter
        # Test that notebooks can be converted (basic syntax check)
        python -m nbconvert --to python notebooks/chapter-01-generalist-to-specialist.ipynb --output /tmp/test1.py
        python -m nbconvert --to python notebooks/chapter-02-model-architectures.ipynb --output /tmp/test2.py

  lint-notebooks:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install nbqa black ruff
    
    - name: Check notebook formatting with nbQA (black)
      run: |
        nbqa black --check notebooks/ || true
    
    - name: Check notebook linting with nbQA (ruff)
      run: |
        nbqa ruff check notebooks/ || true

  validate-markdown:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install markdown lint
      run: |
        pip install mdl
    
    - name: Lint markdown files
      run: |
        mdl labs/*.md
        mdl wiki/*.md
        mdl docs/*.md